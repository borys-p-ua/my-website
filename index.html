<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <link rel="preload" href="/my-website/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/my-website/fonts/inter-700.woff2" as="font" type="font/woff2" crossorigin />
    <script>
      ;(function () {
        var t = localStorage.getItem('theme')
        document.documentElement.setAttribute(
          'data-theme',
          t === 'light' ? 'light' : 'dark'
        )
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
