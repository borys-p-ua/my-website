<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Borys Polietaiev — Principal Engineer · Tech Lead · Engineering Manager</title>
    <meta
      name="description"
      content="Principal Engineer and Engineering Manager with 13+ years building backend systems and high-performing teams. Based in Bath, UK — open to remote and hybrid roles."
    />
    <link rel="canonical" href="https://borys-p-ua.github.io/my-website/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://borys-p-ua.github.io/my-website/" />
    <meta
      property="og:title"
      content="Borys Polietaiev — Principal Engineer · Tech Lead · Engineering Manager"
    />
    <meta
      property="og:description"
      content="Principal Engineer and Engineering Manager with 13+ years building backend systems and high-performing teams. Based in Bath, UK — open to remote and hybrid roles."
    />
    <meta
      property="og:image"
      content="https://borys-p-ua.github.io/my-website/images/og-image.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Borys Polietaiev — Principal Engineer · Tech Lead · Engineering Manager"
    />
    <meta
      name="twitter:description"
      content="Principal Engineer and Engineering Manager with 13+ years building backend systems and high-performing teams. Based in Bath, UK — open to remote and hybrid roles."
    />
    <meta
      name="twitter:image"
      content="https://borys-p-ua.github.io/my-website/images/og-image.png"
    />

    <!-- JSON-LD Person schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Borys Polietaiev",
        "url": "https://borys-p-ua.github.io/my-website/",
        "jobTitle": "Principal Engineer · Tech Lead · Engineering Manager",
        "worksFor": { "@type": "Organization", "name": "Expedition Software" },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Bath",
          "addressRegion": "Somerset",
          "addressCountry": "GB"
        },
        "email": "compparty1@gmail.com",
        "sameAs": [
          "https://linkedin.com/in/poletayev",
          "https://github.com/borys-p-ua"
        ]
      }
    </script>

    <!-- Font preloads -->
    <link
      rel="preload"
      href="/my-website/fonts/inter-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/my-website/fonts/inter-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Theme detection (runs before React to avoid flash) -->
    <script>
      ;(function () {
        var t = localStorage.getItem('theme')
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
